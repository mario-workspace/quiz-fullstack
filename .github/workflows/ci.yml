name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: school
          POSTGRES_PASSWORD: school
          POSTGRES_DB: school_portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://school:school@localhost:5432/school_portal
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run db:migrate

      - run: npm run test

      - run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        id: dockerhub
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets OK (username chars: ${#DOCKERHUB_USERNAME}, token chars: ${#DOCKERHUB_TOKEN})."
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            [ -z "$DOCKERHUB_USERNAME" ] && echo "::warning::DOCKERHUB_USERNAME is missing."
            [ -z "$DOCKERHUB_TOKEN" ] && echo "::warning::DOCKERHUB_TOKEN is missing."
            echo "Will build images only (no Docker Hub push)."
          fi

      - name: Set image tags
        id: tags
        run: |
          if [ "${{ steps.dockerhub.outputs.push }}" = "true" ]; then
            echo "api=${DOCKERHUB_USERNAME}/school-portal-api:latest" >> "$GITHUB_OUTPUT"
            echo "web=${DOCKERHUB_USERNAME}/school-portal-web:latest" >> "$GITHUB_OUTPUT"
          else
            echo "api=school-portal-api:ci" >> "$GITHUB_OUTPUT"
            echo "web=school-portal-web:ci" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.push == 'true'
        run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ steps.dockerhub.outputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.api }}
          target: api
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
          cache-to: type=gha,mode=max,scope=school-portal-api-v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ steps.dockerhub.outputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.web }}
          target: web
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
          cache-to: type=gha,mode=max,scope=school-portal-web-v3
